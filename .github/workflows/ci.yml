name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # Build + test on macOS (Xcode toolchain) and Linux (official Swift
  # release container). Windows Swift CI is not yet wired up — Swift
  # Windows tooling is supported but the runner story is messier; tracked
  # for a follow-up.
  # ---------------------------------------------------------------------
  test-macos:
    name: test / macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: swift --version
      - run: swift build
      - run: swift test

  test-linux:
    name: test / linux / ${{ matrix.swift }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.10", "6.0"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v6
      - run: swift --version
      - run: swift build
      - run: swift test

  # ---------------------------------------------------------------------
  # Adversarial decoder corpus — HARDENING.md conformance reference.
  # The spec script handles per-port build and corpus iteration; this
  # job just sets up the sibling layout the script expects.
  # ---------------------------------------------------------------------
  hardening:
    name: HARDENING.md corpus
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      # cross_security_check.sh resolves SIBLING_DIR=parent_of_spec and
      # then SWIFT_DIR=$SIBLING_DIR/protowire-swift. Check both repos out
      # as siblings so the path math works.
      - uses: actions/checkout@v6
        with:
          path: protowire-swift

      - uses: actions/checkout@v6
        with:
          repository: trendvidia/protowire
          path: protowire

      - name: Run corpus
        run: bash protowire/scripts/cross_security_check.sh
