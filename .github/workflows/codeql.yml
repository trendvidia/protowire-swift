name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          queries: security-and-quality

      - run: swift build

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
